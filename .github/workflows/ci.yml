name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fast:
    runs-on: ubuntu-latest
    env:
      ATLAS_LOOP_RUN_IOS_SMOKE: "0"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: bash scripts/verify-local.sh --no-smoke

  native-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Build native HID helper
        run: swift build --package-path native/ios-hid-helper
      - name: Check native HID helper protocol
        run: node scripts/check-hid-helper-protocol.mjs native/ios-hid-helper/.build/debug/ios-hid-helper --out artifacts/ci/hid-helper-protocol.ndjson
      - name: Build deterministic iOS demo
        run: |
          xcodebuild \
            -project apps/ios-commerce-demo/CommerceDemo.xcodeproj \
            -scheme CommerceDemo \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath artifacts/ci/DerivedData \
            build CODE_SIGNING_ALLOWED=NO
      - name: Cache driver runner DerivedData
        uses: actions/cache@v4
        with:
          path: artifacts/ci/DriverRunnerDerivedData
          key: driver-runner-${{ runner.os }}-${{ hashFiles('native/ios-driver-runner/**') }}
      - name: Build XCUITest driver runner (build-for-testing)
        run: |
          xcodebuild \
            -project native/ios-driver-runner/AtlasDriverRunner.xcodeproj \
            -scheme AtlasDriverRunner \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath artifacts/ci/DriverRunnerDerivedData \
            build-for-testing CODE_SIGNING_ALLOWED=NO
      - name: Check driver runner xctestrun output
        run: ls artifacts/ci/DriverRunnerDerivedData/Build/Products/AtlasDriverRunner_*.xctestrun
